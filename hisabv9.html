/* ── AEPS ──────────────────────────────────────────────
   Aadhaar Enabled Payment System — the core of CSC business.
   Withdrawal: customer takes cash, operator's AEPS wallet
   gets the settlement. Deposit: reverse. Operator earns a
   small commission/charge per transaction.
   Kept deliberately simple: amount + commission + done.
   ─────────────────────────────────────────────────────── */
const Aeps = {
  mode:'withdraw', // 'withdraw' | 'deposit'

  // Suggested commission by withdrawal amount slab (operator can change)
  slab(amt){
    if(!amt||amt<=0)return 0;
    if(amt<=500)return 5;
    if(amt<=1000)return 10;
    if(amt<=2000)return 15;
    if(amt<=5000)return 20;
    return 25;
  },

  show(){this.mode='withdraw';this._render()},

  setMode(m){
    const a=document.getElementById('aeAmt')?.value;
    const c=document.getElementById('aeComm')?.value;
    const p=document.getElementById('aePhone')?.value;
    this.mode=m;
    this._render();
    if(a)document.getElementById('aeAmt').value=a;
    if(c)document.getElementById('aeComm').value=c;
    if(p)document.getElementById('aePhone').value=p;
    this._calc();
  },

  _render(){
    const isW=this.mode==='withdraw';
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">🏧 AEPS Cash</div><div class="ms">${isW?'Customer ko paise nikaal ke do':'Customer se paise jama karo'}</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="atog">
          <button class="${isW?'sel':''}" onclick="Aeps.setMode('withdraw')">💸 Withdrawal</button>
          <button class="${!isW?'sel':''}" onclick="Aeps.setMode('deposit')">💵 Deposit</button>
        </div>

        <div class="fg">
          <p class="flabel"><span class="fnum" style="background:#0891b2;">1</span> ${isW?'Kitna cash nikla?':'Kitna cash jama?'}</p>
          <div class="amtwrap">
            <input type="number" class="inp big" id="aeAmt" inputmode="decimal" placeholder="0"
              oninput="Aeps._suggest()" aria-label="AEPS amount">
          </div>
          <div class="chips mt8">
            ${[500,1000,2000,3000,5000,10000].map(a=>`<button class="chip sm" onclick="Aeps._setA(${a})">₹${a>=1000?(a/1000)+'k':a}</button>`).join('')}
          </div>
        </div>

        <div class="divider"></div>

        <div class="fg">
          <p class="flabel"><span class="fnum" style="background:#16a34a;">2</span> Aapki Kamai (Commission)</p>
          <div class="amtwrap">
            <input type="number" class="inp big" id="aeComm" inputmode="decimal" placeholder="0"
              oninput="Aeps._calc()" style="font-size:24px;" aria-label="Commission earned">
          </div>
          <div class="chips mt8">
            ${[0,5,10,15,20,25,30,40,50].map(a=>`<button class="chip sm" onclick="Aeps._setC(${a})">₹${a}</button>`).join('')}
          </div>
        </div>

        <div class="divider"></div>

        <div class="fg">
          <p class="flabel"><span class="fnum" style="background:#94a3b8;">3</span> Customer Mobile <span style="text-transform:none;letter-spacing:0;font-weight:400;font-size:10px;">(optional)</span></p>
          <input type="tel" class="inp" id="aePhone" inputmode="numeric" maxlength="10" placeholder="📱 Mobile number">
        </div>

        <div class="calc-box teal">
          <div><div class="cb-l">${isW?'💸 Cash diya':'💵 Cash mila'}</div><div class="cb-v" id="aeSumAmt">₹0</div></div>
          <div style="text-align:right;"><div class="cb-l">💰 Aapki Kamai</div><div class="cb-v" id="aeSumComm">₹0</div></div>
        </div>
      </div>
      <div class="mfoot">
        <button class="btn green" id="aeSaveBtn" onclick="Aeps.save()">✅ Save AEPS</button>
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
    setTimeout(()=>document.getElementById('aeAmt')?.focus(),200);
  },

  _setA(v){const e=document.getElementById('aeAmt');if(e){e.value=v;this._suggest()}},
  _setC(v){const e=document.getElementById('aeComm');if(e){e.value=v;this._calc()}},

  _suggest(){
    const amt=parseFloat(document.getElementById('aeAmt')?.value)||0;
    const ce=document.getElementById('aeComm');
    if(ce&&!ce.value)ce.value=this.slab(amt);
    this._calc();
  },

  _calc(){
    const amt=parseFloat(document.getElementById('aeAmt')?.value)||0;
    const comm=parseFloat(document.getElementById('aeComm')?.value)||0;
    const sa=document.getElementById('aeSumAmt');
    const sc=document.getElementById('aeSumComm');
    if(sa)sa.textContent=F.rs(amt);
    if(sc)sc.textContent=F.rs(comm);
  },

  save(){
    const amt=parseFloat(document.getElementById('aeAmt')?.value)||0;
    const comm=parseFloat(document.getElementById('aeComm')?.value)||0;
    const phone=document.getElementById('aePhone')?.value?.trim()||'';
    if(!amt||amt<=0){
      const e=document.getElementById('aeAmt');
      if(e){e.style.borderColor='#fca5a5';setTimeout(()=>e.style.borderColor='',1200)}
      return Toast.show('⚠️ AEPS amount daalo');
    }
    const isW=this.mode==='withdraw';
    DB.push('entries',{
      type:'aeps', aepsType:this.mode, aepsAmt:amt,
      svcId:'aeps', svc:'AEPS '+(isW?'Withdrawal':'Deposit'),
      amt:comm, pm:'cash',
      cust:'', phone, notes:'',
      day:DB.today(), role:Auth.role(), who:Auth.user().name,
    });
    const btn=document.getElementById('aeSaveBtn');
    if(btn){btn.textContent='🎉 Saved!';btn.classList.add('success');btn.disabled=true}
    Toast.show('✅ AEPS saved! Kamai: '+F.rs(comm));
    setTimeout(()=>{Modal.close();Router.go(Router.cur)},400);
  },
};

const Udhar = {
  render(){

    const total=accts.reduce((s,a)=>s+a.pending,0);
    document.getElementById('main').innerHTML=`
      <div class="hero" style="background:linear-gradient(135deg,#dc2626,#ea580c);">
        <div class="hero-greet">📋 Total Pending</div>

      </div>
      <div class="section">
        <p class="stitle">All Accounts</p>
        ${accts.length===0?`<div class="empty"><div class="ei">✅</div><div class="et">All Clear!</div><div class="es">No pending udhar</div></div>`:
          accts.map(a=>`
            <div class="card mb8" style="cursor:pointer;" onclick="Udhar.detail('${a.phone}')">
              <div class="spread">
                <div>
                  <div style="font-weight:700;font-size:14px;">${a.name||'Unknown'}</div>
                  <div style="font-size:11px;color:#94a3b8;margin-top:2px;">📞 ${a.phone}</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-weight:800;font-size:18px;color:${a.pending>0?'#dc2626':'#16a34a'};">${F.rs(a.pending)}</div>
                  <div style="font-size:10px;color:#94a3b8;">pending</div>
                </div>
              </div>
            </div>`).join('')}
      </div>`;
  },

  detail(phone){
    const a=DB.l('udhar').find(x=>x.phone===phone);if(!a)return;
    const pending=Math.max(0,(a.given||0)-(a.paid||0));
    const txns=(a.tx||[]).slice().reverse();
    Modal.open(`
      <div class="mhead">
        <div>
          <div class="mt">${a.name||'Customer'}</div>
          <div class="ms">📞 ${a.phone}</div>
        </div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="card mb12" style="background:#fef2f2;border:2px solid #fca5a5;">
          <div class="tc">
            <div style="font-size:11px;color:#64748b;text-transform:uppercase;">Pending</div>
            <div style="font-size:36px;font-weight:900;color:#dc2626;letter-spacing:-1px;margin:4px 0;">${F.rs(pending)}</div>
            <div style="font-size:11px;color:#94a3b8;">Given: ${F.rs(a.given||0)} · Paid: ${F.rs(a.paid||0)}</div>
          </div>
        </div>

        ${pending>0?`
          <div class="fg">
            <p class="flabel">💸 Collect Payment</p>
            <input type="number" class="inp" id="cpay" inputmode="decimal" value="${pending}" placeholder="Amount" aria-label="Payment amount">
            <div class="chips mt8">
              <button class="chip sm" onclick="document.getElementById('cpay').value=${pending}">Full ${F.rs(pending)}</button>
              <button class="chip sm" onclick="document.getElementById('cpay').value=${Math.round(pending/2)}">Half ${F.rs(Math.round(pending/2))}</button>
            </div>
            <button class="btn green mt12" onclick="Udhar._collect('${phone}')">✅ Received</button>
          </div>
          <div class="divider"></div>`:''
        }

        <p class="flabel">History</p>
        ${txns.length===0?'<p style="text-align:center;color:#94a3b8;padding:14px;">No history</p>':
          txns.map(t=>`
            <div class="uhist ${t.type}">
              <div>
                <div style="font-weight:600;font-size:13px;">${t.type==='paid'?'💸 Received':'📋 '+(t.svc||'Udhar')}</div>
                <div style="font-size:10px;color:#94a3b8;">${F.date(t.at)} ${F.time(t.at)}</div>
              </div>
              <div style="font-weight:800;color:${t.type==='paid'?'#16a34a':'#dc2626'};">${t.type==='paid'?'+':'-'}${F.rs(t.amt)}</div>
            </div>`).join('')}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;">
          <button class="btn ghost sm" onclick="window.open('tel:+91${a.phone}','_self')">📞 Call</button>
          <button class="btn ghost sm" style="background:#f0fdf4;color:#16a34a;" onclick="Udhar._wa('${a.phone.replace(/'/g,'&#39;')}')">💬 WA</button>
        </div>
      </div>
    `);
  },

  _wa(phone){
    const a=DB.l('udhar').find(x=>x.phone===phone);
    if(!a)return;
    const pending=Math.max(0,(a.given||0)-(a.paid||0));
    const msg='Hi '+(a.name||'')+(a.name?',':'')+' aapka Rohit Computer mein pending balance: '+F.rs(pending)+'. Please clear karo. Thank you 🙏';
    window.open('https://wa.me/91'+phone+'?text='+encodeURIComponent(msg),'_blank');
  },

  _collect(phone){
    const amt=parseFloat(document.getElementById('cpay')?.value);
    if(!amt||amt<=0)return Toast.show('⚠️ Valid amount daalo');
    const accts=DB.l('udhar');
    const a=accts.find(x=>x.phone===phone);if(!a)return;
    a.paid=(a.paid||0)+amt;
    a.tx=a.tx||[];
    a.tx.push({type:'paid',amt,at:new Date().toISOString()});
    DB.s('udhar',accts);
    DB.push('entries',{type:'collect',svc:'Udhar Received: '+(a.name||phone),svcId:'collect',amt,pm:'cash',cust:a.name||'',phone:phone,day:DB.today(),role:Auth.role(),who:Auth.user().name});
    Toast.show('✅ '+F.rs(amt)+' received');
    Modal.close();
    Router.go(Router.cur);
  },
};

  all(){return DB.l(this._k)},
  _ensureDefault(){
    if(!this.all().length){
      DB.push(this._k,{id:'p1',name:'Printer 1',type:'bw',ratePerPage:5,icon:'🖨️'});
    }
  },
  manage(){
    if(!Auth.isOwner())return Toast.show('Owner only');
    this._ensureDefault();
    const list=this.all();
    const renderList=()=>{
      const c=document.getElementById('prList');
      if(!c)return;
      c.innerHTML=list.length===0?'<p style="text-align:center;color:#94a3b8;padding:14px;">No printers added</p>':
        list.map(p=>`<div class="card mb8 spread">
          <div>
            <div style="font-weight:700;font-size:13px;">${p.icon} ${p.name}</div>
            <div style="font-size:11px;color:#94a3b8;">${p.type==='color'?'Colour':'B/W'} · ₹${p.ratePerPage}/page</div>
          </div>
          <button class="btn red sm" style="width:auto;padding:6px 12px;min-height:auto;font-size:12px;" onclick="Printers._del('${p.id}')">🗑️</button>
        </div>`).join('');
    };
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">🖨️ Manage Printers</div><div class="ms">Printer add / remove karo</div></div>
        <button class="mclose" onclick="Modal.close()">✕</button>
      </div>
      <div class="mbody">
        <div id="prList"></div>
        <div class="divider"></div>
        <p class="flabel" style="margin-bottom:8px;">➕ Add Printer</p>
        <div class="fg"><p class="flabel">Printer Name</p><input type="text" class="inp mb8" id="prName" placeholder="e.g. HP LaserJet, Epson Color"></div>
        <div class="fg"><p class="flabel">Type</p>
          <div style="display:flex;gap:8px;">
            <button class="pmbtn sel" id="prBW" onclick="Printers._selType('bw')">B/W</button>
            <button class="pmbtn" id="prCol" onclick="Printers._selType('color')">🎨 Color</button>
          </div>
          <input type="hidden" id="prType" value="bw">
        </div>
        <div class="fg"><p class="flabel">Rate per Page ₹</p><input type="number" class="inp" id="prRate" inputmode="decimal" value="5"></div>
      </div>
      <div class="mfoot">
        <button class="btn blue" onclick="Printers._add()">➕ Add</button>
        <button class="btn ghost" onclick="Modal.close()">Done</button>
      </div>
    `);
    renderList();
  },
  _selType(t){
    document.getElementById('prType').value=t;
    document.getElementById('prBW').classList.toggle('sel',t==='bw');
    document.getElementById('prCol').classList.toggle('sel',t==='color');
  },
  _add(){
    const name=document.getElementById('prName')?.value?.trim();
    const type=document.getElementById('prType')?.value||'bw';
    const rate=parseFloat(document.getElementById('prRate')?.value)||5;
    if(!name)return Toast.show('⚠️ Printer name daalo');
    const id='pr_'+Date.now();
    DB.push(this._k,{id,name,type,ratePerPage:rate,icon:'🖨️'});
    Toast.show('✅ Printer added: '+name);
    document.getElementById('prName').value='';
    this.manage();
  },
  _del(id){
    if(!confirm('Printer delete karo?'))return;
    DB.del(this._k,id);
    Toast.show('✅ Printer removed');
    this.manage();
  },
};

/* ── MONEY BOXES ── */
const Money = {
  _opening(){
    const today=DB.today(),key='mbo_'+today;
    let d=DB.g(key);
    if(!d||!Object.keys(d).length){
      const dt=new Date();dt.setDate(dt.getDate()-1);
      const yk=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
      const prev=DB.g('mbc_'+yk);
      if(prev){DB.s(key,prev);return {...prev}}
    }
    return d||{};
  },
  _closing(){return DB.g('mbc_'+DB.today())||{}},
  _inflow(id){
    const es=DB.l('entries').filter(e=>e.day===DB.today());
    // AEPS money flows
    const aepsW=es.filter(e=>e.type==='aeps'&&e.aepsType!=='deposit')
      .reduce((s,e)=>s+(e.aepsAmt||0),0);   // cash given out, wallet in
    const aepsD=es.filter(e=>e.type==='aeps'&&e.aepsType==='deposit')
      .reduce((s,e)=>s+(e.aepsAmt||0),0);   // cash received, wallet out
    const aepsComm=es.filter(e=>e.type==='aeps').reduce((s,e)=>s+(e.amt||0),0);
    if(id==='cash'){
      let v=es.filter(e=>e.pm==='cash'&&e.type!=='aeps'&&e.type!=='expense')
        .reduce((s,e)=>s+e.amt,0);
      v+=aepsComm;       // commission earned
      v-=aepsW;          // cash handed out for withdrawals
      v+=aepsD;          // cash received for deposits
      v-=es.filter(e=>e.type==='expense'&&e.pm==='cash').reduce((s,e)=>s+e.amt,0);
      return v;
    }
    if(id==='online'){
      return es.filter(e=>e.pm==='online'&&e.type!=='aeps'&&e.type!=='expense')
        .reduce((s,e)=>s+e.amt,0)
        - es.filter(e=>e.type==='expense'&&e.pm==='online').reduce((s,e)=>s+e.amt,0);
    }
    if(id==='aeps') return aepsW-aepsD;   // net AEPS wallet settlement
    return 0;
  },
  boxes(){
    const o=this._opening(),c=this._closing();
    return C.boxes.map(b=>{
      const op=o[b.id]||0,inf=this._inflow(b.id),exp=op+inf;
      const act=c[b.id]!==undefined?c[b.id]:null;
      return {...b,op,inf,exp,act};
    });
  },
  showOpening(){
    if(!Auth.isOwner())return Toast.show('Owner only');
    const op=this._opening();
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">🔓 Opening Balance</div><div class="ms">${new Date().toLocaleDateString('en-IN')}</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <p style="font-size:12px;color:#64748b;margin-bottom:14px;">Subah ki shuruaat ki raqam daalo</p>
        ${C.boxes.map(b=>`
          <div class="fg">
            <p class="flabel">${b.icon} ${b.name}</p>
            <input type="number" class="inp" id="op_${b.id}" inputmode="decimal" value="${op[b.id]||''}" placeholder="₹ 0" aria-label="${b.name} opening balance">
          </div>`).join('')}
      </div>
      <div class="mfoot">
        <button class="btn blue" onclick="Money._saveOp()">✅ Save Balance</button>
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
    setTimeout(()=>document.getElementById('op_cash')?.focus(),200);
  },
  _saveOp(){
    const d={};
    C.boxes.forEach(b=>{const v=parseFloat(document.getElementById('op_'+b.id)?.value);if(!isNaN(v)&&v>=0)d[b.id]=v});
    if(!Object.keys(d).length)return Toast.show('⚠️ Kuch to daalo');
    DB.s('mbo_'+DB.today(),d);Modal.close();Toast.show('✅ Opening saved');Router.go(Router.cur);
  },
  showClosing(){
    if(!Auth.isOwner())return Toast.show('Owner only');
    const boxes=this.boxes();
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">🔒 Daily Closing</div><div class="ms">Asli raqam daalo</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        ${boxes.map(b=>`
          <div class="card mb8">
            <p style="font-weight:700;font-size:13px;margin-bottom:8px;">${b.icon} ${b.name}</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:10px;color:#64748b;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f1f5f9;">
              <span>Open<br><b>${F.short(b.op)}</b></span>
              <span>In<br><b style="color:#16a34a;">${F.short(b.inf)}</b></span>
              <span>Expected<br><b style="color:#1d4ed8;">${F.rs(b.exp)}</b></span>
            </div>
            <input type="number" class="inp" id="cl_${b.id}" inputmode="decimal" value="${b.act!==null?b.act:''}" placeholder="Actual amount..."
              oninput="Money._diff('${b.id}',this.value,${b.exp})" aria-label="${b.name} actual amount">
            <p id="dif_${b.id}" style="font-size:11px;font-weight:700;height:16px;margin-top:6px;"></p>
          </div>`).join('')}
      </div>
      <div class="mfoot">
        <button class="btn red" onclick="Money._saveCl()">🔒 Close Day</button>
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
  },
  _diff(id,val,exp){
    const el=document.getElementById('dif_'+id);if(!el)return;
    if(!val){el.textContent='';return}
    const a=parseFloat(val);if(isNaN(a)){el.textContent='';return}
    const d=a-exp;
    if(d===0){el.textContent='✅ Perfect!';el.style.color='#16a34a'}
    else if(d>0){el.textContent='🔺 +'+F.rs(d)+' extra';el.style.color='#ea580c'}
    else{el.textContent='🔻 '+F.rs(Math.abs(d))+' short';el.style.color='#dc2626'}
  },
  _saveCl(){
    const d={};let mm=0;
    C.boxes.forEach(b=>{
      const v=parseFloat(document.getElementById('cl_'+b.id)?.value);
      if(!isNaN(v)&&v>=0){
        d[b.id]=v;
        const box=this.boxes().find(x=>x.id===b.id);
        if(box&&Math.abs(v-box.exp)>0.01)mm++;
      }
    });
    if(!Object.keys(d).length)return Toast.show('⚠️ Kuch to daalo');
    DB.s('mbc_'+DB.today(),d);
    // Show cancelled entries summary before closing
    const today=DB.today();
    const cancelled=DB.l('entries').filter(e=>e.day===today&&e.cancelled);
    if(cancelled.length){
      Toast.show(`⚠️ ${mm} mismatch · ${cancelled.length} cancelled entries!`,3500);
    } else {
      Toast.show(mm?`⚠️ ${mm} box mismatch!`:'✅ Sab match! Day closed 🎉');
    }
    Modal.close();
    Router.go(Router.cur);
  },
};

/* ── IMPORT ── */
const Import = {
  show(){
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">📥 Import Data</div><div class="ms">Backup JSON ya CSV</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="import-zone" id="importZone"
          onclick="document.getElementById('importFile').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="event.preventDefault();this.classList.remove('drag');Import._handle(event.dataTransfer.files[0])">
          <div class="iz-icon">📂</div>
          <div class="iz-title">Tap to select file</div>
          <div class="iz-sub">ya yahan drag karo</div>
          <div class="iz-sub" style="margin-top:6px;color:#93c5fd;">Supported: .json (Hisab backup)</div>
        </div>
        <input type="file" id="importFile" accept=".json,application/json" style="display:none"
          onchange="Import._handle(this.files[0])">

        <div style="margin-top:16px;padding:12px 14px;background:#fef9c3;border-radius:12px;border:1.5px solid #facc15;">
          <p style="font-size:12px;font-weight:700;color:#854d0e;margin-bottom:4px;">⚠️ Import modes</p>
          <p style="font-size:11px;color:#a16207;line-height:1.6;">
            <b>Merge:</b> Existing data rakhega, naya add karega (duplicates skip)<br>
            <b>Replace:</b> Sab data delete hokar naya aayega
          </p>
        </div>
      </div>
      <div class="mfoot">
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
  },

  _handle(file){
    if(!file)return;
    if(!file.name.endsWith('.json'))return Toast.show('⚠️ Only .json files supported');
    const reader=new FileReader();
    reader.onerror=()=>Toast.show('❌ File read failed');
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.data||typeof data.data!=='object')throw new Error('invalid');
        this._confirm(data);
      }catch{Toast.show('❌ Invalid backup file')}
    };
    reader.readAsText(file,'utf-8');
  },

  _confirm(data){
    const entries=(data.data.entries||[]).length;
    const udhar=(data.data.udhar||[]).length;
    const from=data.exported?new Date(data.exported).toLocaleDateString('en-IN'):'Unknown';
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">📥 Confirm Import</div><div class="ms">Exported: ${from}</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="card mb12">
          <div class="spread mb8"><span style="color:#64748b;font-size:12px;">Entries</span><span class="pill blue">${entries}</span></div>
          <div class="spread mb8"><span style="color:#64748b;font-size:12px;">Udhar accounts</span><span class="pill red">${udhar}</span></div>
          <div class="spread"><span style="color:#64748b;font-size:12px;">Backup version</span><span class="pill">${data.v||'?'}</span></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn blue" onclick="Import._do(${JSON.stringify(data).split('').map(c=>'\\u'+c.charCodeAt(0).toString(16).padStart(4,'0')).join('')},\'merge\')">🔀 Merge (safe)</button>
          <button class="btn red" onclick="Import._do(null,'replace','${btoa(JSON.stringify(data))}')">♻️ Replace All Data</button>
        </div>
      </div>
      <div class="mfoot">
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
    // Store data for use by buttons (avoid inline JSON issues)
    Import._pending=data;
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">📥 Confirm Import</div><div class="ms">Exported: ${from}</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="card mb12">
          <div class="spread mb8"><span style="color:#64748b;font-size:12px;">Entries</span><span class="pill blue">${entries}</span></div>
          <div class="spread mb8"><span style="color:#64748b;font-size:12px;">Udhar accounts</span><span class="pill red">${udhar}</span></div>
          <div class="spread"><span style="color:#64748b;font-size:12px;">Backup version</span><span class="pill">v${data.v||'?'}</span></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn blue" onclick="Import._do('merge')">🔀 Merge (recommended)</button>
          <button class="btn red" onclick="Import._do('replace')">♻️ Replace All Data</button>
        </div>
      </div>
      <div class="mfoot"><button class="btn ghost" onclick="Modal.close()">Cancel</button></div>
    `);
  },

  _pending:null,

  _do(mode){
    const data=this._pending;
    if(!data)return Toast.show('❌ No data to import');
    if(mode==='replace'){
      if(!confirm('⚠️ Sab existing data delete hoga! Sure?'))return;
      Object.keys(localStorage).filter(k=>k.startsWith('rc8_')&&k!=='rc8_session').forEach(k=>localStorage.removeItem(k));
    }
    let added=0,skipped=0;
    Object.entries(data.data).forEach(([k,v])=>{
      if(mode==='merge'&&Array.isArray(v)){
        const existing=DB.l(k);
        v.forEach(item=>{
          if(item.id&&existing.find(x=>x.id===item.id)){skipped++}
          else{existing.push(item);added++}
        });
        DB.s(k,existing);
      } else {
        DB.s(k,v);added++;
      }
    });
    this._pending=null;
    Toast.show(`✅ Import done! ${added} added, ${skipped} skipped`);
    Modal.close();
    Router.go(Router.cur);
  },
};

/* ── REPORTS ── */
const Reports = {
  tab:'today',
  render(){
    if(!Auth.isOwner()){
      document.getElementById('main').innerHTML='<div class="empty"><div class="ei">🔒</div><div class="et">Owner Only</div><div class="es">Reports sirf owner ke liye hain</div></div>';
      return;
    }
    this._draw();
  },
  _draw(){
    const all=DB.l('entries'),now=new Date();
    let es,label;
    if(this.tab==='today'){es=all.filter(e=>e.day===DB.today());label='Today'}
    else if(this.tab==='week'){
      const d=new Date(now);d.setDate(d.getDate()-7);
      es=all.filter(e=>e.day>=d.toISOString().split('T')[0]);label='7 Days';
    } else {
      const d=new Date(now);d.setDate(d.getDate()-30);
      es=all.filter(e=>e.day>=d.toISOString().split('T')[0]);label='30 Days';
    }
    const revEs=es.filter(e=>e.type!=='expense'&&!e.cancelled);
    const expEs=es.filter(e=>e.type==='expense'&&!e.cancelled);
    const aepsEs=es.filter(e=>e.type==='aeps'&&!e.cancelled);
    const total=revEs.reduce((s,e)=>s+e.amt,0);
    const expTotal=expEs.reduce((s,e)=>s+e.amt,0);
    const net=total-expTotal;
    const cash=revEs.filter(e=>e.pm==='cash').reduce((s,e)=>s+e.amt,0);
    const online=revEs.filter(e=>e.pm==='online').reduce((s,e)=>s+e.amt,0);
    const udhar=revEs.filter(e=>e.pm==='udhar').reduce((s,e)=>s+e.amt,0);
    const aepsVol=aepsEs.reduce((s,e)=>s+(e.aepsAmt||0),0);
    const aepsComm=aepsEs.reduce((s,e)=>s+(e.amt||0),0);
    const staffMap={};
    revEs.forEach(e=>{const k=e.who||'Unknown';if(!staffMap[k])staffMap[k]={n:0,t:0};staffMap[k].n++;staffMap[k].t+=e.amt});
    const svcMap={};
    revEs.forEach(e=>{svcMap[e.svc]=(svcMap[e.svc]||0)+1});
    const top=Object.entries(svcMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
    // Expense breakdown by category
    const expMap={};
    expEs.forEach(e=>{const c=(e.svc||'Other').replace('Kharcha: ','');expMap[c]=(expMap[c]||0)+e.amt});
    const expBreak=Object.entries(expMap).sort((a,b)=>b[1]-a[1]);
    const tabBtn=(t,l)=>`<button class="rtab ${this.tab===t?'active':''}" onclick="Reports.tab='${t}';Reports._draw()">${l}</button>`;

    document.getElementById('main').innerHTML=`
      <div class="section">
        <p class="stitle">📊 Reports <span class="slink" onclick="Reports._export()">📥 Export</span></p>
        <div class="rtabs">${tabBtn('today','Today')}${tabBtn('week','7 Days')}${tabBtn('month','30 Days')}</div>

        <div class="hero mb12">
          <div class="hero-greet">${label} Income</div>
          <div class="hero-amt">${F.rs(total)}</div>
          <div class="hero-lbl">${revEs.length} entries</div>
          <div class="hero-stats">
            <div class="hstat"><div class="sl">💵 CASH</div><div class="sv">${F.short(cash)}</div></div>
            <div class="hstat"><div class="sl">📱 ONLINE</div><div class="sv">${F.short(online)}</div></div>
            <div class="hstat"><div class="sl">📋 UDHAR</div><div class="sv">${F.short(udhar)}</div></div>
          </div>
        </div>

        <p class="stitle">💹 Profit Summary</p>
        <div class="card mb16">
          <div class="spread mb8"><span style="color:#64748b;font-size:13px;">📈 Total Income</span><span style="font-weight:800;color:#16a34a;font-size:15px;">${F.rs(total)}</span></div>
          <div class="spread mb8"><span style="color:#64748b;font-size:13px;">💸 Total Kharcha</span><span style="font-weight:800;color:#7c3aed;font-size:15px;">−${F.rs(expTotal)}</span></div>
          <div class="divider" style="margin:8px 0;"></div>
          <div class="spread"><span style="font-weight:700;font-size:14px;">💰 Net Profit</span><span style="font-weight:900;font-size:20px;color:${net>=0?'#16a34a':'#dc2626'};">${F.rs(net)}</span></div>
        </div>

        ${aepsEs.length>0?`
          <p class="stitle">🏧 AEPS Summary</p>
          <div class="card mb16" style="border-left:4px solid #0891b2;">
            <div class="spread mb8"><span style="color:#64748b;font-size:13px;">Total Volume</span><span style="font-weight:800;color:#0891b2;font-size:15px;">${F.rs(aepsVol)}</span></div>
            <div class="spread mb8"><span style="color:#64748b;font-size:13px;">Transactions</span><span class="pill blue">${aepsEs.length}</span></div>
            <div class="spread"><span style="color:#64748b;font-size:13px;">Commission Earned</span><span style="font-weight:800;color:#16a34a;font-size:15px;">+${F.rs(aepsComm)}</span></div>
          </div>`:''}

        ${expBreak.length>0?`
          <p class="stitle">💸 Kharcha Breakdown</p>
          <div class="card mb16">
            ${expBreak.map(([n,v],i)=>`
              <div class="spread" style="padding:7px 0;${i<expBreak.length-1?'border-bottom:1px solid #f1f5f9;':''}">
                <span style="font-size:13px;">${n}</span>
                <span style="font-weight:700;color:#7c3aed;">${F.rs(v)}</span>
              </div>`).join('')}
          </div>`:''}

        ${Object.keys(staffMap).length>0?`
          <p class="stitle">👥 Staff</p>
          ${Object.entries(staffMap).sort((a,b)=>b[1].t-a[1].t).map(([n,s])=>`
            <div class="card mb8 spread">
              <div><div style="font-weight:700;font-size:13px;">${n}</div><div style="font-size:11px;color:#94a3b8;">${s.n} entries</div></div>
              <div style="font-weight:800;color:#2563eb;">${F.rs(s.t)}</div>
            </div>`).join('')}`:''}

        ${top.length>0?`
          <p class="stitle mt8">🏆 Top Services</p>
          <div class="card">
            ${top.map(([n,c],i)=>`
              <div class="spread" style="padding:8px 0;${i<top.length-1?'border-bottom:1px solid #f1f5f9;':''}">
                <span style="font-size:13px;">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]} ${n}</span>
                <span class="pill blue">${c}x</span>
              </div>`).join('')}
          </div>`:''}

  _expRange:'today',
  _setExpRange(range,el){
    this._expRange=range;

    const cr=document.getElementById('customRange');
    if(cr)cr.style.display=range==='custom'?'block':'none';
    this._updateExpInfo();
  },
  _updateExpInfo(){
    const es=this._getExpEntries();
    const el=document.getElementById('expInfo');
    if(el)el.textContent=es.length+' entries found · Total: '+F.rs(es.reduce((s,e)=>s+e.amt,0));
  },
  _getExpEntries(){
    const all=DB.l('entries'),now=new Date();
    const range=this._expRange||'today';
    if(range==='today')return all.filter(e=>e.day===DB.today());
    if(range==='week'){const d=new Date(now);d.setDate(d.getDate()-7);return all.filter(e=>e.day>=d.toISOString().split('T')[0])}
    if(range==='month'){const d=new Date(now);d.setDate(d.getDate()-30);return all.filter(e=>e.day>=d.toISOString().split('T')[0])}
    if(range==='all')return all;
    if(range==='custom'){
      const from=document.getElementById('expFrom')?.value||DB.today();
      const to=document.getElementById('expTo')?.value||DB.today();
      return all.filter(e=>e.day>=from&&e.day<=to);
    }
    return all;
  },
  _doExport(){
    const es=this._getExpEntries();
    if(!es.length)return Toast.show('⚠️ No entries found');
    let csv='Date,Time,Service,Type,Income,AEPS Volume,Payment,Customer,Phone,Staff,Notes\n';
    es.forEach(e=>{
      const esc=s=>'"'+(s||'').toString().replace(/"/g,'""')+'"';
      const isExp=e.type==='expense';
      const income=isExp?-e.amt:e.amt;
      const aepsV=e.type==='aeps'?(e.aepsAmt||0):'';
      csv+=`${e.day},${F.time(e.at)},${esc(e.svc)},${e.type||'service'},${income},${aepsV},${e.pm},${esc(e.cust)},${e.phone||''},${esc(e.who)},${esc(e.notes)}\n`;
    });
    const label=this._expRange==='custom'?
      (document.getElementById('expFrom')?.value||'custom')+'_to_'+(document.getElementById('expTo')?.value||'custom')
      :this._expRange;
    const b=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download=`hisab_${label}_${DB.today()}.csv`;a.click();URL.revokeObjectURL(u);
    Toast.show('✅ CSV downloaded! ('+es.length+' entries)');
  },
};

  _backup(){
    const keys=Object.keys(localStorage).filter(k=>k.startsWith('rc8_'));
    const data={v:'9',exported:new Date().toISOString(),data:{}};
    keys.forEach(k=>{try{data.data[k.replace('rc8_','')]=JSON.parse(localStorage.getItem(k))}catch{}});
    const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download=`hisab_backup_${DB.today()}.json`;a.click();URL.revokeObjectURL(u);
    Toast.show('✅ Backup downloaded!');
  },
  _attendance(){
    const today=DB.today();
    const todayData=DB.g('at_'+today)||{};
    const now=new Date();
    const monthDays=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const staffSet=new Set();
    // Collect all known staff from last 30 days
    for(let i=0;i<30;i++){
      const d=new Date(now);d.setDate(d.getDate()-i);
      const k='at_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const v=DB.g(k)||{};
      Object.keys(v).forEach(n=>staffSet.add(n));
    }
    const staffList=[...staffSet];
    // Build today summary
    const todayRows=()=>{
      if(!Object.keys(todayData).length) return '<p style="text-align:center;color:#94a3b8;padding:20px;">Aaj koi present nahi hua</p>';
      return Object.entries(todayData).map(([name,att])=>{
        const pIn=att?.punchIn,pOut=att?.punchOut;
        let hrs='—';
        if(pIn&&pOut){const diff=new Date(pOut)-new Date(pIn);hrs=Math.floor(diff/3600000)+'h '+Math.floor((diff%3600000)/60000)+'m';}
        else if(pIn){const diff=Date.now()-new Date(pIn);hrs=Math.floor(diff/3600000)+'h '+Math.floor((diff%3600000)/60000)+'m (jari)';}
        return `<div class="card mb8">
          <div class="spread">
            <div style="font-weight:700;font-size:13px;">${name}</div>
            <span class="pill green">✅ Present</span>
          </div>
          <div style="font-size:11px;color:#64748b;margin-top:4px;display:flex;gap:12px;">
            <span>In: ${pIn?F.time(pIn):'—'}</span>
            <span>Out: ${pOut?F.time(pOut):'—'}</span>
            <span>⏱️ ${hrs}</span>
          </div>
        </div>`;
      }).join('');
    };
    // Build monthly summary
    const monthRows=()=>{
      if(!staffList.length) return '<p style="text-align:center;color:#94a3b8;padding:20px;">No attendance data</p>';
      const yr=now.getFullYear(),mo=now.getMonth();
      return staffList.map(name=>{
        let present=0,totalMs=0;
        const cells=Array.from({length:monthDays},(_,i)=>{
          const d=new Date(yr,mo,i+1);
          const k='at_'+yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
          const v=DB.g(k)||{};
          const att=v[name];
          if(!att) return `<div class="atcell a" title="${i+1}" style="background:${d>now?'#f8fafc':'#fef2f2'};color:${d>now?'#cbd5e1':'#dc2626'};">${d>now?'':''}</div>`;
          present++;
          if(att.punchIn&&att.punchOut) totalMs+=new Date(att.punchOut)-new Date(att.punchIn);
          return `<div class="atcell p" title="${i+1}">✓</div>`;
        });
        const totHrs=Math.floor(totalMs/3600000);
        return `<div class="card mb12">
          <div class="spread mb8"><span style="font-weight:700;font-size:13px;">${name}</span><span class="pill green">${present}/${monthDays} days · ${totHrs}h</span></div>
          <div style="display:flex;flex-wrap:wrap;gap:2px;">${cells.join('')}</div>
        </div>`;
      }).join('');
    };
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">👥 Attendance</div><div class="ms">${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</div></div>
        <button class="mclose" onclick="Modal.close()">✕</button>
      </div>
      <div class="mbody">
        <div class="rtabs" style="margin-bottom:12px;">
          <button class="rtab active" id="attTabToday" onclick="App._attTab('today')">📅 Aaj</button>
          <button class="rtab" id="attTabMonth" onclick="App._attTab('month')">📆 Mahina</button>
        </div>
        <div id="attToday">${todayRows()}</div>
        <div id="attMonth" style="display:none;">${monthRows()}</div>
      </div>
    `);
  },

    const tEl=document.getElementById('attToday');

    if(!name)return Toast.show('⚠️ Product name daalo');
    if(!price||price<=0)return Toast.show('⚠️ Price daalo');
    const id='cp_'+Date.now();
    const prod={id,name,price,icon};
    const custom=DB.l('custom_prods');custom.push(prod);DB.s('custom_prods',custom);
    C.prods.push(prod);
    Toast.show('✅ Product added: '+name);this._manageProducts();
  },

  _staffName(){
    const cur=DB.g('staff_name')||'Staff';
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">✏️ Staff Name</div><div class="ms">Login ke liye naam set karo</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="fg">
          <p class="flabel">Staff ka Naam</p>
          <input type="text" class="inp" id="snInp" value="${cur}" placeholder="e.g. Ramu, Shyam, Laxmi" autocomplete="off">
        </div>
        <p style="font-size:12px;color:#94a3b8;margin-top:4px;">Yeh naam entries mein dikhega. Staff ko dobara login karna hoga.</p>
      </div>
      <div class="mfoot">
        <button class="btn blue" onclick="App._saveStaffName()">✅ Save Name</button>
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
    setTimeout(()=>document.getElementById('snInp')?.focus(),200);
  },
  _saveStaffName(){
    const name=document.getElementById('snInp')?.value?.trim();
    if(!name)return Toast.show('⚠️ Naam daalo');
    DB.s('staff_name',name);
    Toast.show('✅ Staff name set: '+name);
    Modal.close();
  },
  _reset(){
    if(!confirm('⚠️ DANGER: Sab data delete hoga!'))return;
    if(!confirm('LAST CHANCE! Confirm delete?'))return;
    Object.keys(localStorage).filter(k=>k.startsWith('rc8_')).forEach(k=>localStorage.removeItem(k));
    Toast.show('🗑️ Data cleared');Modal.close();
    setTimeout(()=>location.reload(),1500);
  },
};

/* ── KEYBOARD HANDLER ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('loginOverlay')?.style.display!=='flex'){
    Modal.close();
  }
  // Keyboard shortcuts on desktop
  if(e.ctrlKey||e.metaKey){
    if(e.key==='n'&&Auth.role()){e.preventDefault();Entry.show()}
  }
});

/* ── LOGIN KEYBOARD ── */
document.addEventListener('keypress',e=>{
  const overlay=document.getElementById('loginOverlay');
  if(overlay&&overlay.style.display==='flex'){
    if(e.key>='0'&&e.key<='9')Login.tap(e.key);
    else if(e.key==='Backspace'||e.key==='\x08')Login.back();
  }
});
document.addEventListener('keydown',e=>{
  const overlay=document.getElementById('loginOverlay');
  if(overlay&&overlay.style.display==='flex'){
    if(e.key==='Backspace')Login.back();
    else if(e.key==='Escape')Login.clear();
  }
});

/* ── BOOT ── */
let _booted=false;
function _boot(){
  if(_booted)return;
  _booted=true;
  // Embed mode: detect iframe OR ?embed param in URL
  const inFrame=()=>{try{return window.self!==window.top}catch{return true}};
  const params=new URLSearchParams(window.location.search);
  if(inFrame()||params.has('embed')){
    document.body.classList.add('embed');
    // Allow caller to set height via ?h=800
    if(params.get('h')){
      document.documentElement.style.setProperty('--embed-h',params.get('h')+'px');
    }
    // Tell parent frame our natural scroll height (for auto-sizing iframes)
    try{parent.postMessage({hisabHeight:document.getElementById('app')?.offsetHeight||700},'*')}catch{}
  }
  // ── Run data migrations (safe, non-destructive) ──
  Migration.run();
  // ── Load custom services ──
  const custom=DB.l('custom_svcs');
  custom.forEach(s=>{if(!C.svcs.find(x=>x.id===s.id))C.svcs.push(s)});
  // ── Load custom products ──
  const customProds=DB.l('custom_prods');
  const hiddenProds=DB.l('prod_hidden');
  customProds.forEach(p=>{if(!C.prods.find(x=>x.id===p.id))C.prods.push(p)});
  C.prods=C.prods.filter(p=>!hiddenProds.includes(p.id));
  // ── Ensure default printer exists ──
  Printers._ensureDefault();
  requestAnimationFrame(()=>App.init());
}
// Fire immediately if DOM already ready (Hostinger/dynamic injection),
// otherwise wait for DOMContentLoaded
if(document.readyState==='loading'){
  window.addEventListener('DOMContentLoaded',_boot);
}else{
  _boot();
}

/* ── INSTALL PROMPT (PWA) ── */
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  // Could show install button here if desired
});
</script>
