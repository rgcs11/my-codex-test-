    const today=DB.today();
    const es=DB.l('entries').filter(e=>e.day===today).reverse();
    const total=es.reduce((s,e)=>s+e.amt,0);
    const cash=es.filter(e=>e.pm==='cash').reduce((s,e)=>s+e.amt,0);
    const online=es.filter(e=>e.pm==='online').reduce((s,e)=>s+e.amt,0);
    const udharAmt=es.filter(e=>e.pm==='udhar').reduce((s,e)=>s+e.amt,0);
    const pendU=DB.l('udhar').reduce((s,a)=>s+Math.max(0,(a.given||0)-(a.paid||0)),0);
    const hr=new Date().getHours();
    const greet=hr<12?'🌅 Good Morning':hr<17?'☀️ Good Afternoon':'🌙 Good Evening';
    const boxes=Money.boxes();

    document.getElementById('main').innerHTML=`
      <div class="hero">
        <div class="hero-greet">${greet}, Rohit!</div>
        <div class="hero-amt">${F.rs(total)}</div>
        <div class="hero-lbl">Today · ${es.length} entries</div>
        <div class="hero-stats">
          <div class="hstat"><div class="sl">💵 CASH</div><div class="sv">${F.short(cash)}</div></div>
          <div class="hstat"><div class="sl">📱 ONLINE</div><div class="sv">${F.short(online)}</div></div>
          <div class="hstat"><div class="sl">📋 UDHAR</div><div class="sv">${F.short(udharAmt)}</div></div>
        </div>
      </div>

      <div class="section">
        <p class="stitle">⚡ Quick Actions</p>
        <div class="qagrid">
          <button class="qabtn primary" onclick="Entry.show()"><span class="qi">➕</span><span class="ql">New Entry</span></button>
          <button class="qabtn" onclick="Entry.showSale()"><span class="qi">🛒</span><span class="ql">Product Sale</span></button>
          <button class="qabtn" onclick="Router.go('udhar')"><span class="qi">📋</span><span class="ql">${pendU>0?'Udhar<br><b style=\'color:#dc2626;\'>'+F.rs(pendU)+'</b>':'Udhar'}</span></button>
          <button class="qabtn" onclick="Money.showOpening()"><span class="qi">🔓</span><span class="ql">Opening</span></button>
          <button class="qabtn" onclick="Money.showClosing()"><span class="qi">🔒</span><span class="ql">Closing</span></button>
          <button class="qabtn" onclick="Router.go('reports')"><span class="qi">📊</span><span class="ql">Reports</span></button>
          <button class="qabtn" onclick="App.staffAttend()"><span class="qi">👥</span><span class="ql">Attendance</span></button>
          <button class="qabtn" onclick="App.settings()"><span class="qi">⚙️</span><span class="ql">Settings</span></button>
        </div>
      </div>

      <div class="section">
        <p class="stitle">💰 Money Boxes <span class="slink" onclick="Money.showClosing()">🔒 Closing</span></p>
        <div class="mbgrid">
          ${boxes.map(b=>{
            const diff=b.act!==null?b.act-b.exp:null;
            const cls=diff===null?'':(diff===0?'ok':'bad');
            const icon=diff===null?'':(diff===0?'✅':diff>0?'🔺':'🔻');
            return `<div class="mbcard ${cls}" onclick="Money.showClosing()">
              <div>
                <div class="ml">${b.icon} ${b.name}</div>
                <div class="ma">${F.short(b.act!==null?b.act:b.exp)}</div>
              </div>
              <div class="mm">${icon} Op: ${F.short(b.op)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="section">
        <p class="stitle">📋 Today's Entries ${es.length>0?`<span class="pill">${es.length}</span>`:''}</p>
        ${es.length===0?
          `<div class="empty"><div class="ei">📝</div><div class="et">No entries yet</div><div class="es">Start adding entries!</div><button class="eb" onclick="Entry.show()">➕ First Entry</button></div>`:
          `<div class="elist">${es.slice(0,25).map(e=>this._ecard(e)).join('')}</div>`}
      </div>
    `;
  },

  renderStaff(){
    const today=DB.today(),myName=Auth.user().name;
    const myEs=DB.l('entries').filter(e=>e.day===today&&e.who===myName).reverse();
    const myTotal=myEs.reduce((s,e)=>s+e.amt,0);
    const hr=new Date().getHours();
    const greet=hr<12?'🌅 Subah ko swagat':hr<17?'☀️ Dopahar namaste':'🌙 Shaam ko namaste';
    const attend=DB.g('at_'+today)||{};
    const present=!!attend[myName];

    document.getElementById('main').innerHTML=`
      <div class="hero" style="background:linear-gradient(135deg,#0891b2,#0e7490);">
        <div class="hero-greet">${greet}, Staff!</div>
        <div class="hero-amt">${F.rs(myTotal)}</div>
        <div class="hero-lbl">Aapki aaj ki ${myEs.length} entries</div>
      </div>

      ${!present?`
        <div class="attend-banner pending">
          <div>
            <div style="font-weight:700;font-size:13px;color:#854d0e;">🕐 Attendance Pending</div>
            <div style="font-size:11px;color:#a16207;margin-top:2px;">Mark karo shuruaat ke liye</div>
          </div>
          <button class="btn green" style="width:auto;padding:10px 18px;font-size:13px;min-height:auto;" onclick="Home._attend()">✅ Present</button>
        </div>`:
        `<div class="attend-banner done">
          <div>
            <div style="font-weight:700;font-size:13px;color:#15803d;">✅ Present Aaj</div>
            <div style="font-size:11px;color:#16a34a;margin-top:2px;">Marked at ${F.time(attend[myName])}</div>
          </div>
        </div>`}

      <div class="staffbtns">
        <button class="bgtbtn blue" onclick="Entry.show()">
          <div class="bi">➕</div><div class="bl">New Entry</div><div class="bs">Service add karo</div>
        </button>
        <button class="bgtbtn green" onclick="Entry.showSale()">
          <div class="bi">🛒</div><div class="bl">Product Sale</div><div class="bs">Items becho</div>
        </button>
      </div>

      <div class="scgrid mb12">
        <div class="scard blue"><div class="sl">📊 Entries</div><div class="sv" style="color:#1e40af;">${myEs.length}</div><div class="ss">today</div></div>
        <div class="scard green"><div class="sl">💰 Total</div><div class="sv" style="color:#15803d;">${F.rs(myTotal)}</div><div class="ss">today</div></div>
      </div>

      <div class="section">
        <p class="stitle">📋 Meri Entries ${myEs.length>0?`<span class="pill">${myEs.length}</span>`:''}</p>
        ${myEs.length===0?
          `<div class="empty"><div class="ei">📝</div><div class="et">Koi entry nahi</div><div class="es">Upar se entry karo!</div></div>`:
          `<div class="elist">${myEs.map(e=>this._ecard(e)).join('')}</div>`}
      </div>
    `;
  },

  _attend(){
    const today=DB.today(),name=Auth.user().name;
    const d=DB.g('at_'+today)||{};
    d[name]=new Date().toISOString();
    DB.s('at_'+today,d);
    Toast.show('✅ Present marked!');
    Router.go('home');
  },
};

/* ── ROUTER ── */
const Router = {
  cur:'home',
  go(view){
    this.cur=view;
    if(view==='home')Auth.isOwner()?Home.renderOwner():Home.renderStaff();
    else if(view==='udhar')Udhar.render();
    else if(view==='reports')Reports.render();
    this._nav();
    // Scroll to top on view change
    const main=document.getElementById('main');
    if(main)main.scrollTop=0;
  },
  _nav(){
    const isO=Auth.isOwner();
    document.getElementById('bnav').innerHTML=isO?`
      <button class="nbtn ${this.cur==='home'?'active':''}" onclick="Router.go('home')"><span class="ni">🏠</span><span>Home</span></button>
      <button class="nbtn ${this.cur==='udhar'?'active':''}" onclick="Router.go('udhar')"><span class="ni">📋</span><span>Udhar</span></button>
      <button class="nbtn fab" onclick="Entry.show()" aria-label="New Entry"><span class="ni">＋</span><span>Entry</span></button>
      <button class="nbtn ${this.cur==='reports'?'active':''}" onclick="Router.go('reports')"><span class="ni">📊</span><span>Reports</span></button>
      <button class="nbtn" onclick="App.settings()"><span class="ni">⚙️</span><span>Settings</span></button>
    `:`
      <button class="nbtn ${this.cur==='home'?'active':''}" onclick="Router.go('home')"><span class="ni">🏠</span><span>Home</span></button>
      <button class="nbtn ${this.cur==='udhar'?'active':''}" onclick="Router.go('udhar')"><span class="ni">📋</span><span>Udhar</span></button>
      <button class="nbtn fab" onclick="Entry.show()" aria-label="New Entry"><span class="ni">＋</span><span>Entry</span></button>
      <button class="nbtn" onclick="Entry.showSale()"><span class="ni">🛒</span><span>Sale</span></button>
      <button class="nbtn" onclick="App.settings()"><span class="ni">⚙️</span><span>Settings</span></button>
    `;
  },
};

/* ── APP ── */
const App = {
  init(){
    if(Auth.init())this.boot();
    else Login.show();
  },
  boot(){
    document.getElementById('roleBadge').textContent=Auth.isOwner()?'👑 Owner':'👤 Staff';
    Router.go('home');
  },
  staffAttend(){this._attendance()},
  settings(){
    const isO=Auth.isOwner();
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">⚙️ Settings</div><div class="ms">${isO?'👑 Owner':'👤 Staff'}</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="card mb12">
          <div class="spread">
            <div>
              <div style="font-weight:700;font-size:14px;">${Auth.user().name}</div>
              <div style="font-size:11px;color:#94a3b8;">${isO?'Owner Account':'Staff Account'}</div>
            </div>
            <button class="pill red" onclick="App._logout()" style="cursor:pointer;padding:5px 12px;">Logout</button>
          </div>
        </div>

        ${isO?`
          <button class="btn ghost mb8" onclick="App._backup()" style="justify-content:flex-start;">📦 Backup (JSON Download)</button>
          <button class="btn ghost mb8" onclick="Reports._export()" style="justify-content:flex-start;">📊 Export CSV</button>
          <button class="btn ghost mb8" onclick="Import.show()" style="justify-content:flex-start;">📥 Import Data</button>
          <button class="btn ghost mb8" onclick="App._attendance()" style="justify-content:flex-start;">👥 Staff Attendance</button>
          <button class="btn ghost mb8" onclick="App._staffName()" style="justify-content:flex-start;">✏️ Set Staff Name</button>
          <button class="btn ghost mb8" onclick="App._addService()" style="justify-content:flex-start;">➕ Add Custom Service</button>
          <button class="btn ghost mb8" style="background:#fef2f2;color:#dc2626;justify-content:flex-start;" onclick="App._reset()">🗑️ Clear All Data</button>
        `:`<p style="text-align:center;color:#94a3b8;font-size:12px;padding:14px;">Staff ke liye limited settings hai.<br>Owner se contact karo changes ke liye.</p>`}

        <div style="text-align:center;font-size:10px;color:#94a3b8;margin-top:16px;padding-top:12px;border-top:1px solid #f1f5f9;">
          Hisab v9 · Rohit Computer · Rath, Hamirpur
        </div>
      </div>
    `);
  },
  _logout(){
    if(!confirm('Logout karna chahte ho?'))return;
    Auth.logout();Modal.close();Login.show();
  },
  _backup(){
    const keys=Object.keys(localStorage).filter(k=>k.startsWith('rc8_'));
    const data={v:'9',exported:new Date().toISOString(),data:{}};
    keys.forEach(k=>{try{data.data[k.replace('rc8_','')]=JSON.parse(localStorage.getItem(k))}catch{}});
    const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download=`hisab_backup_${DB.today()}.json`;a.click();URL.revokeObjectURL(u);
    Toast.show('✅ Backup downloaded!');
  },
  _attendance(){
    const today=DB.today(),data=DB.g('at_'+today)||{};
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">👥 Staff Attendance</div><div class="ms">${new Date().toLocaleDateString('en-IN')}</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        ${Object.keys(data).length===0?
          '<p style="text-align:center;color:#94a3b8;padding:24px;">Aaj koi present nahi hua</p>':
          Object.entries(data).map(([name,time])=>`
            <div class="card mb8 spread">
              <div><div style="font-weight:700;font-size:13px;">${name}</div><div style="font-size:11px;color:#94a3b8;">In: ${F.time(time)}</div></div>
              <span class="pill green">✅ Present</span>
            </div>`).join('')}
      </div>
    `);
  },
  _addService(){
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">➕ Custom Service</div><div class="ms">Quick access ke liye</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="fg"><p class="flabel">Service Name</p><input type="text" class="inp" id="csn" placeholder="e.g. DL Form, RC Transfer" autocomplete="off"></div>
        <div class="fg"><p class="flabel">Default Rate ₹</p><input type="number" class="inp" id="csr" inputmode="decimal" placeholder="0"></div>
      </div>
      <div class="mfoot">
        <button class="btn blue" onclick="App._saveService()">➕ Add Service</button>
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
  },
  _saveService(){
    const name=document.getElementById('csn')?.value?.trim();
    const rate=parseFloat(document.getElementById('csr')?.value)||0;
    if(!name)return Toast.show('⚠️ Name daalo');
    const uid='c_'+Date.now();
    const svc={id:uid,name,rate,cat:'Custom'};
    const custom=DB.l('custom_svcs');
    custom.push(svc);
    DB.s('custom_svcs',custom);
    C.svcs.push(svc);
    Toast.show('✅ Service added: '+name);Modal.close();
  },
  _staffName(){
    const cur=DB.g('staff_name')||'Staff';
    Modal.open(`
      <div class="mhead">
        <div><div class="mt">✏️ Staff Name</div><div class="ms">Login ke liye naam set karo</div></div>
        <button class="mclose" onclick="Modal.close()" aria-label="Close">✕</button>
      </div>
      <div class="mbody">
        <div class="fg">
          <p class="flabel">Staff ka Naam</p>
          <input type="text" class="inp" id="snInp" value="${cur}" placeholder="e.g. Ramu, Shyam, Laxmi" autocomplete="off">
        </div>
        <p style="font-size:12px;color:#94a3b8;margin-top:4px;">Yeh naam entries mein dikhega. Staff ko dobara login karna hoga.</p>
      </div>
      <div class="mfoot">
        <button class="btn blue" onclick="App._saveStaffName()">✅ Save Name</button>
        <button class="btn ghost" onclick="Modal.close()">Cancel</button>
      </div>
    `);
    setTimeout(()=>document.getElementById('snInp')?.focus(),200);
  },
  _saveStaffName(){
    const name=document.getElementById('snInp')?.value?.trim();
    if(!name)return Toast.show('⚠️ Naam daalo');
    DB.s('staff_name',name);
    Toast.show('✅ Staff name set: '+name);
    Modal.close();
  },
  _reset(){
    if(!confirm('⚠️ DANGER: Sab data delete hoga!'))return;
    if(!confirm('LAST CHANCE! Confirm delete?'))return;
    Object.keys(localStorage).filter(k=>k.startsWith('rc8_')).forEach(k=>localStorage.removeItem(k));
    Toast.show('🗑️ Data cleared');Modal.close();
    setTimeout(()=>location.reload(),1500);
  },
};

/* ── KEYBOARD HANDLER ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('loginOverlay')?.style.display!=='flex'){
    Modal.close();
  }
  // Keyboard shortcuts on desktop
  if(e.ctrlKey||e.metaKey){
    if(e.key==='n'&&Auth.role()){e.preventDefault();Entry.show()}
  }
});

/* ── LOGIN KEYBOARD ── */
document.addEventListener('keypress',e=>{
  const overlay=document.getElementById('loginOverlay');
  if(overlay&&overlay.style.display==='flex'){
    if(e.key>='0'&&e.key<='9')Login.tap(e.key);
    else if(e.key==='Backspace'||e.key==='\x08')Login.back();
  }
});
document.addEventListener('keydown',e=>{
  const overlay=document.getElementById('loginOverlay');
  if(overlay&&overlay.style.display==='flex'){
    if(e.key==='Backspace')Login.back();
    else if(e.key==='Escape')Login.clear();
  }
});

/* ── BOOT ── */
window.addEventListener('DOMContentLoaded',()=>{
  const custom=DB.l('custom_svcs');
  custom.forEach(s=>{if(!C.svcs.find(x=>x.id===s.id))C.svcs.push(s)});
  requestAnimationFrame(()=>App.init());
});

/* ── INSTALL PROMPT (PWA) ── */
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  // Could show install button here if desired
});
</script>
